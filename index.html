<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 Cat & Fish</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a0f0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }
  canvas {
    display: block;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(255,160,80,0.18), 0 8px 40px rgba(0,0,0,0.5);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: none;
  }
  #wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>
<div id="wrapper"><canvas id="c"></canvas></div>
<script>
// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 640;
canvas.width = W; canvas.height = H;

// Scale canvas on small screens
function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H, 1.4);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Palette ───────────────────────────────────────────────────────────────────
const C = {
  bgSky:    '#FFF0DC', bgMid:    '#C8EBFF',
  waterTop: '#8CD2E6', waterBot: '#50AAC8',
  waterGl:  'rgba(255,255,255,0.24)',
  groundC:  '#D2AF82', grassC:   '#96D278',
  catBody:  '#FFC8A0', catStripe:'#E6A06E',
  catBelly: '#FFE6D2', catEye:   '#50A050',
  catNose:  '#FF8CA0', catInner: '#FFB4BE',
  fish1:    '#FFA064', fish2:    '#A0DCF0', fish3:    '#FFD264',
  bombC:    '#A08264',
  panelBg:  'rgba(255,245,235,0.88)', panelBd: '#DCB48C',
  textDark: '#644632', textPink: '#F06482', textMint: '#50B4A0',
  starC:    '#FFDC50',
};

// ── State ─────────────────────────────────────────────────────────────────────
let state = 'MENU'; // MENU | PLAYING | DEAD
let score = 0, bestScore = 0, lives = 3;
let frameCount = 0, fishInterval = 90;
let catX = W / 2, catFacingLeft = false;
let catchAnim = 0;
let tailAnim = 0, blinkTimer = 0, menuFloat = 0, bgWave = 0;
let moveLeft = false, moveRight = false;

const CAT_Y = H - 100, CAT_W = 64, CAT_SPEED = 5;

let fishes = [], bombs = [], particles = [], scorePopups = [];

// Bubbles
let bubbles = Array.from({length: 18}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: 4 + Math.random()*10, sp: 0.4 + Math.random()*0.6
}));

// ── Fish class ────────────────────────────────────────────────────────────────
function makeFish(x, speed, type, isBomb) {
  return { x, y: -30, speed, type, isBomb, wobble: 0, flipX: Math.random() < 0.5 };
}
function fishColor(f) {
  if (f.isBomb) return C.bombC;
  return [C.fish1, C.fish2, C.fish3][f.type];
}
function fishPoints(f) { return [1,2,3][f.type]; }
function fishHitsCat(f) {
  return Math.abs(f.x - catX) < CAT_W/2 + 18 && Math.abs(f.y - CAT_Y) < 28;
}

// ── Game logic ────────────────────────────────────────────────────────────────
function startGame() { state = 'PLAYING'; frameCount = 0; }

function resetGame() {
  catX = W/2; fishes=[]; bombs=[]; particles=[]; scorePopups=[];
  score=0; lives=3; frameCount=0; fishInterval=90; catchAnim=0;
  state='PLAYING';
}

function spawnFish() {
  const x = 30 + Math.random()*(W-60);
  const speed = 2.0 + Math.random()*2.5 + (90-fishInterval)*0.04;
  const type = Math.random()<0.5 ? 0 : Math.random()<0.7 ? 1 : 2;
  fishes.push(makeFish(x, speed, type, false));
}

function spawnBomb() {
  const x = 30 + Math.random()*(W-60);
  const speed = 1.8 + Math.random()*1.5;
  bombs.push(makeFish(x, speed, 0, true));
}

function spawnCatchParticles(x, y, col) {
  for (let i=0;i<14;i++) {
    const ang=Math.random()*Math.PI*2, sp=Math.random()*4+1.5;
    const r=parseInt(col.slice(1,3),16)||255;
    const g=parseInt(col.slice(3,5),16)||160;
    const b=parseInt(col.slice(5,7),16)||100;
    particles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,r,g,b});
  }
  for (let i=0;i<6;i++) {
    const ang=Math.random()*Math.PI*2, sp=Math.random()*3+2;
    particles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,r:255,g:240,b:100});
  }
}

function spawnBombParticles(x, y) {
  for (let i=0;i<16;i++) {
    const ang=Math.random()*Math.PI*2, sp=Math.random()*5+1;
    particles.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,r:180,g:100,b:60});
  }
}

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function update() {
  bgWave   += 0.03;
  menuFloat+= 0.04;
  tailAnim += 0.07;
  blinkTimer+=0.02;
  if (catchAnim > 0) catchAnim -= 0.06;
  else if (catchAnim < 0) catchAnim += 0.06;

  // Bubbles
  bubbles.forEach(b => { b.y -= b.sp; if (b.y < -20) { b.y=H+10; b.x=Math.random()*W; } });

  // Particles
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=0.04; });

  // Score popups
  scorePopups = scorePopups.filter(p => p.life > 0);
  scorePopups.forEach(p => { p.y-=1.2; p.life-=0.03; });

  if (state !== 'PLAYING') return;

  frameCount++;

  // Cat movement
  if (moveLeft)  { catX -= CAT_SPEED; catFacingLeft = true; }
  if (moveRight) { catX += CAT_SPEED; catFacingLeft = false; }
  catX = Math.max(CAT_W/2, Math.min(W-CAT_W/2, catX));

  // Spawn
  if (frameCount % fishInterval === 0) spawnFish();
  if (frameCount % 270 === 135) spawnBomb();
  if (frameCount % 600 === 0 && fishInterval > 45) fishInterval -= 5;

  // Update fish
  fishes = fishes.filter(f => {
    f.y += f.speed; f.wobble += 0.18;
    if (fishHitsCat(f)) {
      const col = fishColor(f);
      spawnCatchParticles(f.x, f.y, col === C.fish1 ? '#FFA064' : col === C.fish2 ? '#A0DCF0' : '#FFD264');
      scorePopups.push({x:f.x, y:f.y-20, val:fishPoints(f), life:1});
      score += fishPoints(f);
      if (score > bestScore) bestScore = score;
      catchAnim = 1;
      return false;
    }
    return f.y <= H+40;
  });

  // Update bombs
  bombs = bombs.filter(b => {
    b.y += b.speed; b.wobble += 0.18;
    if (fishHitsCat(b)) {
      spawnBombParticles(b.x, b.y);
      lives--;
      catchAnim = -1;
      if (lives <= 0) { state='DEAD'; }
      return false;
    }
    return b.y <= H+40;
  });
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawBackground() {
  const sky = ctx.createLinearGradient(0,0,0,H*0.55);
  sky.addColorStop(0, C.bgSky); sky.addColorStop(1, C.bgMid);
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H);

  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  drawCloud(60,60,1.0); drawCloud(280,45,0.8); drawCloud(390,80,0.6);

  // Sun
  ctx.fillStyle = 'rgba(255,230,130,0.7)';
  ctx.beginPath(); ctx.arc(W-62,57,27,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,245,180,0.32)';
  ctx.beginPath(); ctx.arc(W-62,57,36,0,Math.PI*2); ctx.fill();
}

function drawCloud(x,y,s) {
  const w=70*s, h=30*s;
  ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,w/2,h/2,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+10*s+20*s,y-14*s+17*s,20*s,17*s,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+30*s+17.5*s,y-8*s+14*s,17.5*s,14*s,0,0,Math.PI*2); ctx.fill();
}

function drawBubbles() {
  bubbles.forEach(b => {
    const alpha = 0.15 + 0.1*Math.sin(b.y*0.05);
    ctx.strokeStyle = `rgba(180,230,255,${alpha})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(b.x+b.r/2, b.y+b.r/2, b.r/2, 0, Math.PI*2); ctx.stroke();
  });
}

function drawWater() {
  const waterY = H-180;
  const wp = ctx.createLinearGradient(0,waterY,0,H);
  wp.addColorStop(0,C.waterTop); wp.addColorStop(1,C.waterBot);
  ctx.fillStyle=wp; ctx.fillRect(0,waterY,W,H-waterY);

  // Waves
  for (let row=0;row<5;row++) {
    const wy = waterY+20+row*20;
    ctx.strokeStyle = `rgba(255,255,255,${(40-row*6)/255})`;
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,wy);
    for (let x=0;x<=W;x+=4) {
      ctx.lineTo(x, wy + 6*Math.sin(x*0.03+bgWave+row*0.7));
    }
    ctx.stroke();
  }

  // Shimmer
  ctx.fillStyle = C.waterGl;
  for (let i=0;i<8;i++) {
    const sx = (i*60+frameCount*0.8)%W;
    const sy = waterY+8+i*12;
    ctx.beginPath(); ctx.ellipse(sx+15,sy+2,15,2,0,0,Math.PI*2); ctx.fill();
  }
}

function drawGround() {
  const gy = H-80;
  const gp = ctx.createLinearGradient(0,gy,0,H);
  gp.addColorStop(0,C.groundC); gp.addColorStop(1,'#B48C5A');
  ctx.fillStyle=gp; ctx.fillRect(0,gy,W,H-gy);

  // Grass strip
  ctx.fillStyle=C.grassC; ctx.fillRect(0,gy-8,W,16);

  // Grass tufts
  ctx.strokeStyle='#78BE5A'; ctx.lineWidth=2;
  for (let x=10;x<W;x+=22) {
    ctx.beginPath(); ctx.moveTo(x,gy-8); ctx.lineTo(x-3,gy-18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+4,gy-8); ctx.lineTo(x+5,gy-20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+8,gy-8); ctx.lineTo(x+7,gy-16); ctx.stroke();
  }

  // Pebbles
  ctx.fillStyle='rgba(200,170,130,0.9)';
  for (let i=0;i<12;i++) {
    const px=20+i*40, py=gy+20;
    ctx.beginPath(); ctx.ellipse(px+6,py+3.5,6,3.5,0,0,Math.PI*2); ctx.fill();
  }
}

function drawFish(f) {
  const wb = Math.sin(f.wobble)*4;
  ctx.save();
  ctx.translate(f.x, f.y+wb);
  if (f.flipX) ctx.scale(-1,1);

  const col = fishColor(f);
  const darkCol = darken(col);

  // Tail
  ctx.fillStyle = darkCol;
  ctx.beginPath(); ctx.moveTo(-10,0); ctx.lineTo(-22,-9); ctx.lineTo(-22,9); ctx.closePath(); ctx.fill();

  // Body
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.ellipse(4,0,14,11,0,0,Math.PI*2); ctx.fill();

  // Belly
  ctx.fillStyle='rgba(255,255,255,0.47)';
  ctx.beginPath(); ctx.ellipse(4,0,8,5,0,0,Math.PI*2); ctx.fill();

  // Scale hints
  ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1;
  for (let i=0;i<3;i++) {
    ctx.beginPath(); ctx.arc(-2+i*6,-3,4,Math.PI,0); ctx.stroke();
  }

  // Eye
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(14,-3,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#282850'; ctx.beginPath(); ctx.arc(15,-2,2.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(16.5,-2,1,0,Math.PI*2); ctx.fill();

  // Fin
  ctx.fillStyle=darkCol;
  ctx.beginPath(); ctx.moveTo(4,-11); ctx.lineTo(0,-20); ctx.lineTo(12,-18); ctx.closePath(); ctx.fill();

  ctx.restore();

  // Star for gold
  if (!f.isBomb && f.type===2) {
    ctx.fillStyle='rgba(255,220,60,0.63)';
    ctx.font='bold 13px Nunito'; ctx.textAlign='center';
    ctx.fillText('★', f.x+6, f.y-18+wb);
  }
}

function drawBoot(b) {
  const wb = Math.sin(b.wobble)*3;
  ctx.save(); ctx.translate(b.x, b.y+wb);

  ctx.fillStyle = C.bombC;
  roundRect(-12,-20,24,26,8); ctx.fill();
  roundRect(-12,2,30,14,6); ctx.fill();

  ctx.strokeStyle='#826446'; ctx.lineWidth=1.5;
  roundRect(-12,-20,24,26,8); ctx.stroke();
  roundRect(-12,2,30,14,6); ctx.stroke();

  // Laces
  ctx.strokeStyle='#DCCAN'; ctx.strokeStyle='rgba(220,200,170,0.9)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-6,-10); ctx.lineTo(6,-10); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(-6,-4); ctx.lineTo(6,-4); ctx.stroke();

  // Warning X
  ctx.fillStyle='rgba(255,80,80,0.8)';
  ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText('✕', 0, -22);

  ctx.restore();
}

function drawCat() {
  const cx = catX, cy = CAT_Y;
  ctx.save(); ctx.translate(cx, cy);
  if (catFacingLeft) ctx.scale(-1,1);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(0,32,28,8,0,0,Math.PI*2); ctx.fill();

  // Tail
  const tw = Math.sin(tailAnim)*30;
  ctx.strokeStyle=C.catStripe; ctx.lineWidth=6;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(-18,10);
  ctx.bezierCurveTo(-35,0,-40+tw,-20,-30+tw,-35);
  ctx.stroke();

  // Body
  ctx.fillStyle=C.catBody; ctx.beginPath(); ctx.ellipse(0,10,22,20,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.catBelly; ctx.beginPath(); ctx.ellipse(1,13,13,14,0,0,Math.PI*2); ctx.fill();

  // Body stripes
  ctx.strokeStyle=C.catStripe; ctx.lineWidth=2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-1,12,7,0.35,2.1); ctx.stroke();
  ctx.beginPath(); ctx.arc(9,12,7,0.35,2.1); ctx.stroke();

  // Head
  ctx.fillStyle=C.catBody; ctx.beginPath(); ctx.ellipse(0,-25,20,19,0,0,Math.PI*2); ctx.fill();

  // Ears
  ctx.fillStyle=C.catBody;
  tri(-18,-40,-26,-62,-8,-55);
  tri(18,-40,26,-62,8,-55);
  ctx.fillStyle=C.catInner;
  tri(-16,-42,-22,-57,-10,-52);
  tri(16,-42,22,-57,10,-52);

  // Head stripes
  ctx.strokeStyle=C.catStripe; ctx.lineWidth=2; ctx.lineCap='round';
  line(-8,-44,-10,-52); line(0,-44,0,-53); line(8,-44,10,-52);

  // Eyes / blink
  const blink = blinkTimer % (Math.PI*4) > Math.PI*3.7;
  if (blink) {
    ctx.strokeStyle=C.catEye; ctx.lineWidth=2.5; ctx.lineCap='round';
    line(-11,-30,-5,-30); line(5,-30,11,-30);
  } else {
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-8,-31,6,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,-31,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.catEye;
    ctx.beginPath(); ctx.arc(-7,-30,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(9,-30,4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='white';
    ctx.beginPath(); ctx.arc(-5,-31,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(11,-31,1.5,0,Math.PI*2); ctx.fill();
  }

  // Nose
  ctx.fillStyle=C.catNose;
  tri(-3,-22,3,-22,0,-18);

  // Mouth
  ctx.strokeStyle='rgba(150,80,60,0.9)'; ctx.lineWidth=1.8; ctx.lineCap='round';
  if (catchAnim > 0.3) {
    ctx.beginPath(); ctx.arc(0,-16,8,0,Math.PI); ctx.stroke();
  } else {
    line(0,-18,-5,-14); line(0,-18,5,-14);
  }

  // Whiskers
  ctx.strokeStyle='rgba(180,140,110,0.7)'; ctx.lineWidth=1;
  line(-4,-21,-26,-18); line(-4,-20,-25,-23);
  line(4,-21,26,-18);  line(4,-20,25,-23);

  // Paws
  ctx.fillStyle=C.catBody;
  ctx.beginPath(); ctx.ellipse(-12,32,8,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12,32,8,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=C.catNose;
  for (let i=0;i<3;i++) {
    ctx.beginPath(); ctx.arc(-16+i*5,35,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(8+i*5,35,1.5,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    const a = Math.max(0,p.life)*220/255;
    ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${a})`;
    const sz = p.life*8+2;
    ctx.beginPath(); ctx.arc(p.x,p.y,sz/2,0,Math.PI*2); ctx.fill();
  });
}

function drawHUD() {
  if (state !== 'PLAYING') return;

  // Score
  ctx.font='bold 46px Nunito';
  ctx.fillStyle='rgba(0,0,0,0.24)'; ctx.textAlign='center';
  ctx.fillText(score, W/2+2, 57);
  ctx.fillStyle=C.textDark;
  ctx.fillText(score, W/2, 55);

  // Lives — mini cat icons
  for (let i=0;i<3;i++) {
    const a = i < lives ? 1.0 : 0.25;
    drawMiniCat(16+i*34, 20, a);
  }

  // Legend
  ctx.font='13px Nunito'; ctx.fillStyle='rgba(100,70,50,0.7)'; ctx.textAlign='left';
  ctx.fillText('★=3pt  ~=2pt  o=1pt', W-158, 20);
}

function drawMiniCat(x, y, alpha) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#FFB482';
  ctx.beginPath(); ctx.ellipse(x+9,y+7,9,7,0,0,Math.PI*2); ctx.fill();
  tri(x+1,y+2,x-2,y-6,x+6,y-4);
  tri(x+17,y+2,x+20,y-6,x+12,y-4);
  ctx.fillStyle='rgba(60,120,60,1)';
  ctx.beginPath(); ctx.arc(x+5,y+6,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+13,y+6,2,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawScorePopups() {
  scorePopups.forEach(p => {
    const a = Math.max(0,p.life);
    ctx.fillStyle = `rgba(240,160,50,${a})`;
    ctx.font='bold 18px Nunito'; ctx.textAlign='center';
    ctx.fillText('+'+p.val, p.x, p.y);
  });
}

function drawPanel(x,y,w,h,r) {
  ctx.fillStyle=C.panelBg;
  roundRect(x,y,w,h,r); ctx.fill();
  ctx.strokeStyle=C.panelBd; ctx.lineWidth=2.5;
  roundRect(x,y,w,h,r); ctx.stroke();
}

function drawMenu() {
  const bob = Math.sin(menuFloat)*5;
  drawPanel(55,160,W-110,280,30);

  ctx.font='bold 22px Nunito'; ctx.textAlign='center';
  ctx.fillStyle=C.fish1; ctx.fillText('><>', 95, 195+bob);
  ctx.fillStyle=C.fish3; ctx.fillText('<><', W-80, 195+bob);

  ctx.font='bold 36px Nunito'; ctx.fillStyle=C.textPink;
  ctx.fillText('CAT & FISH', W/2, 225+bob);

  ctx.strokeStyle=C.panelBd; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(90,238); ctx.lineTo(W-90,238); ctx.stroke();

  ctx.font='bold 15px Nunito'; ctx.fillStyle=C.textDark;
  ctx.fillText('Catch fish, dodge boots!', W/2, 268);
  ctx.fillStyle=C.textMint;
  ctx.fillText('orange = 1pt', W/2, 295);
  ctx.fillText('blue   = 2pt', W/2, 314);
  ctx.fillText('gold   = 3pt', W/2, 333);
  ctx.fillStyle='rgba(220,100,80,0.9)';
  ctx.fillText('boot   = lose life!', W/2, 352);

  const pulse = 0.6 + 0.4*Math.sin(menuFloat*2.5);
  ctx.fillStyle = `rgba(200,100,130,${pulse})`;
  ctx.fillText('[ SPACE or CLICK to start ]', W/2, 400);

  if (bestScore > 0) {
    ctx.font='13px Nunito'; ctx.fillStyle='rgba(180,130,80,0.9)';
    ctx.fillText('best: '+bestScore, W/2, 425);
  }
}

function drawGameOver() {
  drawPanel(55,175,W-110,280,30);
  ctx.strokeStyle=C.textPink; ctx.lineWidth=2.5;
  roundRect(55,175,W-110,280,30); ctx.stroke();

  ctx.font='bold 36px Nunito'; ctx.textAlign='center';
  ctx.fillStyle=C.textPink;
  ctx.fillText('GAYMAN', W/2, 230);

  ctx.font='bold 15px Nunito'; ctx.fillStyle='rgba(160,100,70,0.9)';
  ctx.fillText('The cat is full...', W/2, 258);

  ctx.strokeStyle=C.panelBd; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(90,272); ctx.lineTo(W-90,272); ctx.stroke();

  ctx.font='bold 46px Nunito'; ctx.fillStyle=C.textDark;
  ctx.fillText(score, W/2, 330);
  ctx.font='bold 15px Nunito'; ctx.fillStyle='rgba(160,120,80,0.9)';
  ctx.fillText('fish caught', W/2, 352);

  if (score >= bestScore && score > 0) {
    ctx.fillStyle=C.starC;
    ctx.fillText('★  NEW RECORD!  ★', W/2, 380);
  } else {
    ctx.fillStyle='rgba(160,130,90,0.9)';
    ctx.fillText('best: '+bestScore, W/2, 380);
  }

  const pulse = 0.6+0.4*Math.sin(menuFloat*2.5);
  ctx.fillStyle=`rgba(200,100,130,${pulse})`;
  ctx.fillText('[ SPACE or CLICK to retry ]', W/2, 420);
}

// ── Main render ───────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0,0,W,H);
  drawBackground();
  drawBubbles();
  drawWater();
  drawGround();

  // Hurt flash
  if (catchAnim < -0.1) {
    ctx.fillStyle=`rgba(255,80,80,${Math.abs(catchAnim)*0.31})`;
    ctx.fillRect(0,0,W,H);
  }
  // Catch flash
  if (catchAnim > 0.1) {
    ctx.fillStyle=`rgba(255,255,200,${catchAnim*0.2})`;
    ctx.fillRect(0,0,W,H);
  }

  drawParticles();
  fishes.forEach(drawFish);
  bombs.forEach(drawBoot);
  drawCat();
  drawHUD();
  drawScorePopups();

  if (state==='MENU') drawMenu();
  if (state==='DEAD') drawGameOver();
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();

// ── Input ─────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') moveLeft=true;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') moveRight=true;
  if (e.key===' ' || e.key==='Enter') {
    if (state==='MENU') startGame();
    else if (state==='DEAD') resetGame();
    e.preventDefault();
  }
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft'  || e.key==='a' || e.key==='A') moveLeft=false;
  if (e.key==='ArrowRight' || e.key==='d' || e.key==='D') moveRight=false;
});

canvas.addEventListener('click', () => {
  if (state==='MENU') startGame();
  else if (state==='DEAD') resetGame();
});

// Touch support (mobile)
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  if (state==='MENU') startGame();
  else if (state==='DEAD') resetGame();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  catX = Math.max(CAT_W/2, Math.min(W-CAT_W/2, catX + dx * 1.4));
  touchStartX = e.touches[0].clientX;
}, {passive:false});
canvas.addEventListener('touchend', () => { touchStartX=null; });

// ── Helpers ───────────────────────────────────────────────────────────────────
function tri(x1,y1,x2,y2,x3,y3) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3);
  ctx.closePath(); ctx.fill();
}
function line(x1,y1,x2,y2) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
}
function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
function darken(hex) {
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,r-50); g=Math.max(0,g-50); b=Math.max(0,b-50);
  return `rgb(${r},${g},${b})`;
}
</script>
